<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bisca del Tromba – Classifica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:wght@700;900&family=IM+Fell+English+SC&display=swap');
  :root{--gold:#c9a84c;--gold-light:#f0d080;}
  *{margin:0;padding:0;box-sizing:border-box;}

  body {
    min-height:100vh;
    background:#070e07;
    font-family:'IM Fell English SC',serif;
    display:flex; flex-direction:column; align-items:center;
    padding:48px 20px 80px;
  }
  body::before {
    content:'';
    position:fixed; inset:0; z-index:-1;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(18,52,18,.9) 0%, #040804 65%),
      repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 6px);
  }

  header { text-align:center; margin-bottom:48px; }
  h1 {
    font-family:'Cinzel Decorative',cursive;
    color:var(--gold);
    font-size:clamp(1.6rem,5vw,3rem);
    text-shadow:0 0 28px rgba(201,168,76,.65),2px 2px 6px #000;
    letter-spacing:4px;
    margin-bottom:10px;
  }
  .subtitle {
    color:rgba(201,168,76,.55);
    font-size:1rem;
    letter-spacing:3px;
    margin-bottom:28px;
  }
  .play-btn {
    display:inline-block;
    padding:14px 52px;
    border-radius:40px;
    background:linear-gradient(135deg,#7a5000,var(--gold));
    color:#000;
    font-family:'Cinzel Decorative',cursive;
    font-size:1.05rem;
    letter-spacing:2px;
    text-decoration:none;
    box-shadow:0 4px 24px rgba(201,168,76,.4);
    transition:all .2s;
  }
  .play-btn:hover {
    transform:scale(1.04) translateY(-2px);
    box-shadow:0 8px 36px rgba(201,168,76,.7);
  }

  .card {
    width:100%;
    max-width:680px;
    background:rgba(8,24,8,.9);
    border:2px solid var(--gold);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 50px rgba(201,168,76,.16),inset 0 0 40px rgba(0,0,0,.5);
    margin-top:40px;
  }

  .card-header {
    padding:20px 28px 16px;
    border-bottom:1px solid rgba(201,168,76,.25);
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:8px;
  }
  .card-header h2 {
    font-family:'Cinzel Decorative',cursive;
    color:var(--gold);
    font-size:1.1rem;
    letter-spacing:2px;
  }
  .refresh-btn {
    background:none;
    border:1px solid rgba(201,168,76,.4);
    color:var(--gold);
    border-radius:6px;
    padding:5px 14px;
    font-family:'IM Fell English SC',serif;
    font-size:.82rem;
    cursor:pointer;
    letter-spacing:1px;
    transition:all .15s;
  }
  .refresh-btn:hover { background:rgba(201,168,76,.1); }
  .refresh-btn:disabled { opacity:.4; cursor:not-allowed; }

  table { width:100%; border-collapse:collapse; }
  thead th {
    padding:10px 24px;
    text-align:left;
    color:var(--gold);
    font-size:.78rem;
    letter-spacing:2px;
    border-bottom:1px solid rgba(201,168,76,.2);
    font-family:'Cinzel Decorative',cursive;
    font-weight:400;
  }
  tbody td {
    padding:13px 24px;
    color:var(--gold-light);
    font-size:.95rem;
    border-bottom:1px solid rgba(255,255,255,.04);
    transition:background .15s;
  }
  tbody tr:hover td { background:rgba(201,168,76,.05); }
  tbody tr:last-child td { border-bottom:none; }

  .rank { width:44px; font-weight:900; font-size:1.05rem; color:var(--gold); }
  .rank.gold   { color:#ffd700; }
  .rank.silver { color:#c0c0c0; }
  .rank.bronze { color:#cd7f32; }
  .score-col { text-align:right; color:#fff; font-weight:700; font-size:1.05rem; }
  .date-col  { text-align:right; color:rgba(201,168,76,.4); font-size:.78rem; }

  .card-footer {
    padding:10px 24px;
    border-top:1px solid rgba(201,168,76,.12);
    font-size:.72rem;
    color:rgba(201,168,76,.35);
    text-align:right;
    letter-spacing:1px;
  }

  .warn {
    color:#e74c3c;
    background:rgba(231,76,60,.08);
    border:1px solid rgba(231,76,60,.25);
    border-radius:10px;
    padding:20px 28px;
    font-size:.92rem;
    line-height:1.7;
    max-width:560px;
    text-align:center;
    margin-top:24px;
  }
  code {
    background:rgba(255,255,255,.08);
    border-radius:4px;
    padding:1px 7px;
    font-family:monospace;
    font-size:.88em;
  }
  .empty { color:rgba(201,168,76,.35); text-align:center; padding:36px; font-size:.92rem; }
  .loading { color:rgba(201,168,76,.4); text-align:center; padding:36px; }
</style>
</head>
<body>

<header>
  <h1>♠ Bisca del Tromba ♠</h1>
  <p class="subtitle">Hall of Fame — Cashout Globale</p>
  <a class="play-btn" href="index.html">🎴 Gioca Ora</a>
</header>

<div id="warn" class="warn" style="display:none">
  ⚙️ <strong>Gist non configurato.</strong><br>
  Apri <code>leaderboard.html</code> e <code>index.html</code> e sostituisci<br>
  <code>GIST_ID</code> con l'ID del tuo Gist pubblico.
</div>

<div class="card" id="main-card">
  <div class="card-header">
    <h2>🏆 Top Cashout</h2>
    <button class="refresh-btn" id="refresh-btn" onclick="load()">↺ Aggiorna</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Giocatore</th>
        <th style="text-align:right">Cashout €</th>
        <th style="text-align:right">Data</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="4" class="loading">Caricamento...</td></tr>
    </tbody>
  </table>
  <div class="card-footer" id="footer">—</div>
</div>

<script>
/* ════════════════════════════════════════════════════
   CONFIG — solo GIST_ID, lettura pubblica (no token)
════════════════════════════════════════════════════ */
const GIST_ID     = 'ef1e2705e3c70988b3a2423e07427495.js';  // ← stessa cosa di index.html
const SCORES_FILE = 'leaderboard.json';

const _ok = !GIST_ID.includes('IL_TUO');

if (!_ok) {
  document.getElementById('warn').style.display = 'block';
  document.getElementById('main-card').style.display = 'none';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
}

async function load() {
  if (!_ok) return;
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '...';
  try {
    // Lettura pubblica del Gist — nessun token necessario
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const gist   = await res.json();
    const raw    = gist.files[SCORES_FILE]?.content || '[]';
    const scores = JSON.parse(raw);

    const tbody = document.getElementById('tbody');
    if (!scores.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">Nessun cashout ancora — sii il primo!</td></tr>';
    } else {
      tbody.innerHTML = scores.slice(0,20).map((r,i) => {
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
        const rc    = i===0?'gold':i===1?'silver':i===2?'bronze':'';
        return `<tr>
          <td class="rank ${rc}">${medal}</td>
          <td>${esc(r.name)}</td>
          <td class="score-col">€${Number(r.score).toLocaleString('it-IT')}</td>
          <td class="date-col">${fmtDate(r.date)}</td>
        </tr>`;
      }).join('');
    }
    document.getElementById('footer').textContent =
      'Aggiornato: ' + new Date().toLocaleTimeString('it-IT') +
      ' · ' + scores.length + ' record totali';
  } catch(e) {
    document.getElementById('footer').textContent = 'Errore: ' + e.message;
  }
  btn.disabled = false;
  btn.textContent = '↺ Aggiorna';
}

load();
// Refresh automatico ogni 60 secondi
setInterval(load, 60000);
</script>
</body>
</html>
